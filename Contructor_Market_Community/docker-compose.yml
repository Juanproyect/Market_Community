services:
  app:
    build: .
    ports:
      - "5050:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: market_community
      DB_USER: mc_user
      DB_PASS: mc_password
      JWT_SECRET: change_me_now
      JWT_EXPIRES_IN: 7d
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: market_community
      MYSQL_USER: mc_user
      MYSQL_PASSWORD: mc_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./BD_SQL/BD_market_Comunity_MySql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  uploads_data:
