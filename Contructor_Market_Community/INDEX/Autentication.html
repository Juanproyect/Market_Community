<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inicia sesión o crea tu cuenta en Market Community para comprar, vender y donar ropa." />
    <title>Acceso | Market Community</title>

    <!-- Módulos CSS -->
    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/components.css" />
    <link rel="stylesheet" href="../CSS/layout.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
</head>
<body>

    <main class="auth-wrapper" aria-label="Formulario de acceso">
        <div class="auth-container">

            <!-- Marca -->
            <div class="auth-brand">
                <a href="Home.html">
                    <img src="../img/logo_MC_Blanco.png"
                         alt="Market Community"
                         class="logo-img"
                         style="height:52px; margin: 0 auto var(--spacing-xs);" />
                </a>
                <p>Únete a nuestra comunidad de intercambio</p>
            </div>

            <!-- Tabs de navegación -->
            <div class="auth-tabs" role="tablist">
                <div class="auth-tab active"
                     role="tab"
                     aria-selected="true"
                     data-tab="login"
                     onclick="switchTab('login')">
                    Iniciar Sesión
                </div>
                <div class="auth-tab"
                     role="tab"
                     aria-selected="false"
                     data-tab="register"
                     onclick="switchTab('register')">
                    Registrarse
                </div>
            </div>

            <!-- Panel: Iniciar Sesión -->
            <div id="login-panel"
                 class="auth-form-panel active"
                 role="tabpanel">
                <form id="login-form" novalidate>

                    <div class="form-group">
                        <label for="login-email">Email:</label>
                        <input type="email"
                               id="login-email"
                               name="email"
                               placeholder="tu@email.com"
                               required />
                    </div>

                    <div class="form-group">
                        <label for="login-password">Contraseña:</label>
                        <input type="password"
                               id="login-password"
                               name="password"
                               placeholder="••••••••"
                               required />
                    </div>

                    <button type="submit" class="btn">Iniciar Sesión</button>

                    <div class="auth-forgot">
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                </form>
            </div>

            <!-- Panel: Registrarse -->
            <div id="register-panel"
                 class="auth-form-panel"
                 role="tabpanel">
                <form id="register-form" novalidate>

                    <div class="form-group">
                        <label for="reg-name">Nombre completo:</label>
                        <input type="text"
                               id="reg-name"
                               name="name"
                               placeholder="Tu nombre"
                               required />
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Email:</label>
                        <input type="email"
                               id="reg-email"
                               name="email"
                               placeholder="tu@email.com"
                               required />
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Contraseña:</label>
                        <input type="password"
                               id="reg-password"
                               name="password"
                               placeholder="••••••••"
                               required />
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirmar contraseña:</label>
                        <input type="password"
                               id="confirm-password"
                               name="confirm"
                               placeholder="••••••••"
                               required />
                    </div>

                    <button type="submit" class="btn">Crear Cuenta</button>

                    <p class="auth-legal">
                        Al registrarte, recibirás un email de verificación.
                    </p>

                </form>
            </div>

        </div><!-- /.auth-container -->
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <a href="Home.html">
            <img src="../img/logo_MC_Verde.png"
                 alt="Market Community"
                 class="footer-logo-img" />
        </a>
        <nav class="footer-links" aria-label="Links del footer">
            <a href="Home.html">Inicio</a>
            <a href="#">Sobre Nosotros</a>
            <a href="#">Términos de Uso</a>
            <a href="#">Privacidad</a>
            <a href="#">Contacto</a>
        </nav>
        <p class="footer-copy">&copy; 2024 Market Community &mdash; Compra, vende y dona ropa en tu comunidad.</p>
    </footer>

    <!-- Módulos JS -->
    <script src="../JS/api.js"></script>
    <script src="../JS/navigation.js"></script>
    <script src="../JS/auth.js"></script>
    <script src="../JS/main.js"></script>

</body>
</html>
