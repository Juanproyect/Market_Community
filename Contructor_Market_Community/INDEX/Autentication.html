<!-- Prototipo 2: Autenticación -->
       <!DOCTYPE html>
       <html lang="en">
       <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Autenticación Market Community</title>
        <link rel="stylesheet" href="../CSS/Style.css">
       </head>
       <body>
        <div id="auth" class="prototype">
            <div class="prototype-header">
                <h2>Sistema de Autenticación</h2>
                <p>Registro e inicio de sesión con verificación de email y recuperación de contraseña</p>
            </div>
            <div class="prototype-content">
                <div class="auth-container">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 class="logo">Market Community</h1>
                        <p>Únete a nuestra comunidad de intercambio</p>
                    </div>
                    
                    <div class="auth-tabs">
                        <div class="auth-tab active" onclick="switchTab('login')">Iniciar Sesión</div>
                        <div class="auth-tab" onclick="switchTab('register')">Registrarse</div>
                    </div>
                    
                    <div id="login-form">
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" placeholder="tu@email.com">
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Contraseña:</label>
                            <input type="password" id="password" placeholder="••••••••">
                        </div>
                        
                        <button class="btn">Iniciar Sesión</button>
                        
                        <div style="text-align: center; margin-top: 20px;">
                            <a href="#" style="color: #4CAF50; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                    
                    <div id="register-form" style="display: none;">
                        <div class="form-group">
                            <label for="name">Nombre completo:</label>
                            <input type="text" id="name" placeholder="Tu nombre">
                        </div>
                        
                        <div class="form-group">
                            <label for="reg-email">Email:</label>
                            <input type="email" id="reg-email" placeholder="tu@email.com">
                        </div>
                        
                        <div class="form-group">
                            <label for="reg-password">Contraseña:</label>
                            <input type="password" id="reg-password" placeholder="••••••••">
                        </div>
                        
                        <div class="form-group">
                            <label for="confirm-password">Confirmar contraseña:</label>
                            <input type="password" id="confirm-password" placeholder="••••••••">
                        </div>
                        
                        <button class="btn">Crear Cuenta</button>
                        
                        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #666;">
                            Al registrarte, recibirás un email de verificación
                        </div>
                    </div>
                </div>
            </div>
        </div>
       </body>
       </html>
